<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--ICON LINK-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">

    <!--CSS-->
    <link rel="stylesheet" href="css/calendar_style.css">

    <title>Calendar</title>

    <!--APPLY SAVED THEME BEFORE THE PAGE PAINTS (prevents a light-mode flash)-->
    <script>
        if (localStorage.getItem('eventflow-theme') === 'dark') {
            document.documentElement.classList.add('dark-theme-variables');
        }
    </script>
</head>
<body>
    <!--SIDEBAR-->
    <div class="container">
        <aside>
            <!--LOGO-->
            <div class="top">
                <div class="logo">
                    <img src="img/event_flow3_trans_logo.png" alt="">
                    <h2>Event <span class="main-color">Flow</span> </h2>
                </div>
                <div class="close" id="close-btn">
                    <i class="ri-close-large-line"></i>
                </div>
            </div>

            <div class="sidebar">
                <a href="dashboard.html">
                    <i class="ri-dashboard-fill"></i>
                    <h3>Dashboard</h3>
                </a>
                <a href="eventboard.html">
                    <i class="ri-calendar-event-line"></i>
                    <h3>Events</h3>
                </a>
                <a href="taskboard.html">
                    <i class="ri-todo-line"></i>
                    <h3>Tasks</h3>
                </a>
                <a href="calendar.html" class="active">
                    <i class="ri-calendar-line"></i>
                    <h3>Calendar</h3>
                </a>
                <a href="index.html" id="logoutBtn">
                    <i class="ri-logout-box-r-line"></i>
                    <h3>Logout</h3>
                </a>
            </div>
        </aside>

        <!--MAIN SECTION-->
        <main>
            <h1>Calendar</h1>

            <div class="date">
                <i class="ri-calendar-line"></i>
                <span id="current-date"></span>
            </div>

            <!--CALENDAR CARD-->
            <div class="calendar-card">

                <div class="calendar-header">
                    <button id="prevMonth" aria-label="Previous month">
                        <i class="ri-arrow-left-s-line"></i>
                    </button>
                    <h2 id="calendarMonthYear">Month Year</h2>
                    <button id="nextMonth" aria-label="Next month">
                        <i class="ri-arrow-right-s-line"></i>
                    </button>
                </div>

                <div class="calendar-weekdays">
                    <span>Sun</span>
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thu</span>
                    <span>Fri</span>
                    <span>Sat</span>
                </div>

                <div class="calendar-grid" id="calendarGrid"></div>

            </div>

            <!--DAY TASKS MODAL-->
            <div class="modal" id="dayTasksModal">
                <div class="wrapper">
                    <button class="close-modal" id="closeDayTasksModal">
                        <i class="ri-close-line"></i>
                    </button>

                    <div class="form-header">
                        <div class="titles">
                            <div class="title-add-tasks" id="dayTasksTitle">Tasks</div>
                        </div>
                    </div>

                    <div id="dayTasksList" class="day-tasks-list"></div>
                </div>
            </div>

            <div class="confirm-modal" id="logoutModal">
                <div class="confirm-box">

                    <div class="confirm-icon">
                        <i class="ri-logout-box-r-line"></i>
                    </div>

                    <h3>Logout?</h3>
                    <p>Are you sure you want to logout?</p>

                    <div class="confirm-actions">
                        <button id="cancelLogout" class="btn-cancel">Cancel</button>
                        <button id="confirmLogout" class="btn-delete">Logout</button>
                    </div>

                </div>
            </div>

        </main>

        <!--TOP OF THIRD SECTION-->
        <div class="right">
            <div class="top">
                <button id="menu-btn">
                    <i class="ri-menu-line"></i>
                </button>
                <div class="theme-toggler">
                    <i class="ri-sun-fill active"></i>
                    <i class="ri-moon-fill"></i>
                </div>
                <div class="profile">
                    <div class="info">
                        <p>Hey, <b>User</b></p>
                        <small class="text-muted">Admin</small>
                    </div>
                    <div class="profile-photo">
                        <img src="img/user.png" alt="">
                    </div>
                </div>
            </div>

            <!--UPCOMING DEADLINES-->
            <div class="upcoming-deadlines">
                <h2><b>Upcoming Deadlines</b></h2>
                <div class="deadlines">
                    <div class="deadline" id="upcomingDeadlinesList">
                        <p class="text-muted">No upcoming deadlines.</p>
                    </div>
                </div>
            </div>

            <!-- TASK OVERVIEW -->
            <div class="task-overview">
                <h2><b>Task Overview</b></h2>

                <div class="overview-card">
                    <div class="progress-container">
                        <div class="progress-circle" id="progressCircle">
                            <span id="progressPercent">0%</span>
                        </div>
                    </div>

                    <div class="task-stats">
                        <div class="stat">
                            <span class="completed-dot"></span>
                            <p>Completed <b id="completedCount">0</b></p>
                        </div>

                        <div class="stat">
                            <span class="progress-dot"></span>
                            <p>In Progress <b id="progressCount">0</b></p>
                        </div>

                        <div class="stat">
                            <span class="overdue-dot"></span>
                            <p>Overdue <b id="overdueCount">0</b></p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script type="module" src="js/calendar.js"></script>
</body>
</html>
